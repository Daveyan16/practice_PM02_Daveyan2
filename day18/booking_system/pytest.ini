[pytest]
addopts = -ra -q --cov=src --cov-report=html --cov-report=term-missing
testpaths = tests
python_files = test_*.py
markers =
    slow: tests that take a long time to run
    integration: integration tests (use with -m)
    unit: unit tests (use with -m)
    notification: tests for notification module (use with -m)