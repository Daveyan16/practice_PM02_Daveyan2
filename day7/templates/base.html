<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Armenian System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- БОЛЬШАЯ ГОРА АРАРАТ (SVG) -->
    <div class="big-ararat">
        <svg viewBox="0 0 1200 400" preserveAspectRatio="none">
            <defs>
                <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#3a251c" stop-opacity="0.9"/>
                    <stop offset="100%" stop-color="#0f0907" stop-opacity="1"/>
                </linearGradient>
            </defs>
            <!-- Левая вершина (Большой Арарат) -->
            <polygon points="0,400 300,50 500,400" fill="url(#mountainGrad)" opacity="0.95"/>
            <!-- Правая вершина (Малый Арарат) -->
            <polygon points="700,400 900,80 1200,400" fill="url(#mountainGrad)" opacity="0.9"/>
            <!-- Снежные шапки (белые вершины) -->
            <polygon points="280,100 300,50 330,110" fill="#e8e4df" opacity="0.7"/>
            <polygon points="860,120 900,80 940,130" fill="#e8e4df" opacity="0.7"/>
            <!-- Общее затемнение низа -->
            <rect x="0" y="350" width="1200" height="50" fill="#0a0604" opacity="0.8"/>
        </svg>
    </div>

    <!-- Облака -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <!-- Звёзды -->
    <div class="star" style="top: 15%; left: 20%; width: 2px; height: 2px; animation-delay: 0s;"></div>
    <div class="star" style="top: 30%; left: 70%; width: 3px; height: 3px; animation-delay: 1.2s;"></div>
    <div class="star" style="top: 50%; left: 10%; width: 1.5px; height: 1.5px; animation-delay: 0.7s;"></div>
    <div class="star" style="top: 70%; left: 85%; width: 2px; height: 2px; animation-delay: 2.1s;"></div>

    <div class="container">
        <div class="flag-header">
            <div class="flag-stripes">
                <div class="red-stripe"></div>
                <div class="blue-stripe"></div>
                <div class="orange-stripe"></div>
            </div>
            <div class="flag-title">ՀԱՅԱՍՏԱՆ • АРМЕНИЯ</div>
            <div class="flag-stripes">
                <div class="red-stripe"></div>
                <div class="blue-stripe"></div>
                <div class="orange-stripe"></div>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}

        <div class="footer-decor">
            ☦ 🍇 ☦ 🏔️ ☦
        </div>
    </div>
</body>
</html>
