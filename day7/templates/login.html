{% extends "base.html" %}
{% block title %}Вход | Армянская система{% endblock %}
{% block content %}
<div class="login-form">
    <h2> АВТОРИЗАЦИЯ</h2>
    <form method="POST">
        <div class="form-group">
            <label> Логин</label>
            <input type="text" name="login" required autofocus>
        </div>
        <div class="form-group">
            <label> Пароль</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label> КАПЧА:</label>
            <div class="captcha-text">{{ num1 }} + {{ num2 }} = ?</div>
            <input type="text" name="captcha" placeholder="Введите сумму" required>
        </div>
        <button type="submit"> Войти</button>
    </form>
</div>
{% endblock %}
